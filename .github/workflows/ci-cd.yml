name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # Code Quality and Analysis
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        
      - name: Analyze project source
        run: dart analyze --fatal-infos
        
      - name: Run custom lint rules
        run: flutter analyze
        
  # Unit and Widget Tests
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Generate mocks
        run: dart run build_runner build --delete-conflicting-outputs
        
      - name: Run unit tests
        run: flutter test --coverage
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage/lcov.info
          name: flutter-coverage
          fail_ci_if_error: true
          
  # Integration Tests
  integration_test:
    name: Integration Tests
    runs-on: macos-latest
    needs: test
    strategy:
      matrix:
        device:
          - \"iPhone 15 Simulator (17.0)\"
          - \"iPad Pro (12.9-inch) (6th generation) Simulator (17.0)\"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Start iOS Simulator
        run: |
          xcrun simctl boot \"${{ matrix.device }}\" || true
          xcrun simctl list devices
          
      - name: Run integration tests
        run: flutter test integration_test/app_test.dart
        
  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Check for known vulnerabilities
        run: |
          dart pub deps
          # Add vulnerability scanning tools here
          
  # Build Android APK
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [test, integration_test]
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build APK
        run: |
          flutter build apk --release
          flutter build appbundle --release
          
      - name: Sign APK
        if: github.event_name == 'release'
        run: |
          echo \"${{ secrets.KEYSTORE_BASE64 }}\" | base64 --decode > android/app/keystore.jks
          echo \"storePassword=${{ secrets.KEYSTORE_PASSWORD }}\" >> android/key.properties
          echo \"keyPassword=${{ secrets.KEY_PASSWORD }}\" >> android/key.properties
          echo \"keyAlias=${{ secrets.KEY_ALIAS }}\" >> android/key.properties
          echo \"storeFile=keystore.jks\" >> android/key.properties
          flutter build apk --release
          flutter build appbundle --release
          
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            
  # Build iOS IPA
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [test, integration_test]
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
          
      - name: Build iOS (no signing)
        run: |
          flutter build ios --release --no-codesign
          
      - name: Build iOS with signing
        if: github.event_name == 'release'
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
        run: |
          cd ios
          bundle install
          bundle exec fastlane build_and_sign
          
      - name: Upload IPA artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: ios/build/Runner.ipa
          
  # Deploy to Firebase App Distribution
  deploy_firebase:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: [build_android, build_ios]
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Android artifacts
        uses: actions/download-artifact@v3
        with:
          name: android-apk
          path: android-artifacts/
          
      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: android-artifacts/app-release.apk
          releaseNotes: |
            Changes in this build:
            ${{ github.event.head_commit.message }}
            
  # Deploy to Production
  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build_android, build_ios]
    if: github.event_name == 'release'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Android artifacts
        uses: actions/download-artifact@v3
        with:
          name: android-apk
          path: android-artifacts/
          
      - name: Download iOS artifacts
        uses: actions/download-artifact@v3
        with:
          name: ios-ipa
          path: ios-artifacts/
          
      - name: Deploy to Google Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.example.revive_sunnah_reminder
          releaseFiles: android-artifacts/app-release.aab
          track: production
          status: completed
          
      - name: Deploy to App Store
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          bundle install
          bundle exec fastlane upload_to_app_store
          
  # Performance Testing
  performance_test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build_android
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Run performance tests
        run: |
          flutter test test/performance/
          # Add memory leak detection
          # Add startup time measurement
          
  # Documentation Generation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Generate documentation
        run: |
          dart doc
          
      - name: Deploy documentation
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/api
          
  # Notification
  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy_production]
    if: always() && github.event_name == 'release'
    steps:
      - name: Notify on Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#releases'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}"