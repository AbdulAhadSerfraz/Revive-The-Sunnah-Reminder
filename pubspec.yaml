name: revive_sunnah_reminder
description: A Flutter app to help Muslims revive forgotten Sunnahs with daily reminders and gamified motivation.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & Dependency Injection
  provider: ^6.1.2
  get_it: ^8.2.0
  
  # Data & Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  
  # Network & HTTP
  http: ^1.2.1
  connectivity_plus: ^7.0.0
  dio: ^5.4.0  # Enhanced HTTP client for AI API
  
  # UI & Design
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  lottie: ^3.3.1  # Kept at 3.3.1 for compatibility
  flutter_markdown: ^0.6.20  # For chat message formatting
  
  # Notifications & Background
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  
  # Utils & Formatting
  intl: ^0.20.2
  path_provider: ^2.1.3
  path: ^1.8.3
  
  # Logging & Error Handling
  logger: ^2.3.0
  
  # Security & Encryption
  crypto: ^3.0.3
  
  # Permissions & Device Info
  permission_handler: ^12.0.1
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.0
  
  # Sharing
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # Keep stable version for compatibility
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.12
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/images/
    - assets/translations/
    - assets/animation/
    - assets/fire.json